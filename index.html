<style>
:root{--bg:#F7F6F3;--bg2:#EFEDE8;--w:#FFF;--t:#1A1814;--t2:#6B6760;--t3:#A8A49E;--bd:#E4E1DA;--bd2:#D4D0C8;--a:#18A558;--a2:#22C46E;--al:#D4F5E4;--ax:#EBF9F3;--red:#C0392B;--redl:#FDECEA;--or:#E07B39;--orl:#FEF0E6;--bl:#2C5F8A;--bll:#E8F1F8;--pu:#6B4FA0;--pul:#F0EBF8;--go:#B8860B;--gol:#FDF8E1;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--r:16px;--rs:10px;--rx:6px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
#sc{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:88px}
#sc::-webkit-scrollbar{width:0}
#nav{position:fixed;bottom:0;left:0;right:0;height:76px;background:rgba(247,246,243,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-family:'DM Sans',sans-serif;padding:5px 0;transition:color .2s}
.nb .ni{font-size:17px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}.nb .nl{font-size:8px;font-weight:600;letter-spacing:.2px}
.nb.on{color:var(--a)}.nb.on .ni{transform:scale(1.15)}
.card{background:var(--w);border-radius:var(--r);border:1px solid var(--bd);padding:16px;box-shadow:var(--sh)}
.flat{background:var(--bg2);border-radius:var(--r);padding:16px;border:1px solid var(--bd)}
.ptitle{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.1}
.slbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.lbl{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block}
.btn{border:none;border-radius:var(--rs);padding:11px 14px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--a);color:#fff;box-shadow:0 2px 8px rgba(24,165,88,.22)}.bp:hover{background:var(--a2)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--bd2)}.bg:hover{background:var(--bg2)}
.bd_{background:var(--redl);color:var(--red);border:1px solid rgba(192,57,43,.12)}
.bfull{width:100%}.bsm{padding:7px 11px;font-size:12px;border-radius:var(--rx)}.bxs{padding:4px 8px;font-size:11px;border-radius:var(--rx)}
.inp{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rs);padding:10px 12px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;outline:none;width:100%;transition:border-color .2s,background .2s}
.inp:focus{border-color:var(--a);background:var(--w)}.inp::placeholder{color:var(--t3)}
select.inp option{background:#fff;color:var(--t)}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.cg{background:var(--al);color:var(--a)}.cr{background:var(--redl);color:var(--red)}.co{background:var(--orl);color:var(--or)}.cb{background:var(--bll);color:var(--bl)}.cgo{background:var(--gol);color:var(--go)}.cgr{background:var(--bg2);color:var(--t2);border:1px solid var(--bd)}
.pb{background:var(--bg2);border-radius:99px;overflow:hidden}.pf{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.stars{display:flex;gap:5px}.star{font-size:22px;cursor:pointer;opacity:.25;transition:all .15s}.star.on{opacity:1}
#mo{position:fixed;inset:0;background:rgba(26,24,20,.5);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center}
#mo.open{display:flex}
#mb{background:var(--w);border-radius:24px 24px 0 0;padding:20px 18px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:su .3s cubic-bezier(.34,1.56,.64,1);position:relative}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:32px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px}.mt{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:12px}
.mc_{position:absolute;top:15px;right:15px;width:27px;height:27px;border-radius:50%;border:none;background:var(--bg2);color:var(--t2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
#wo{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
#wo.open{display:flex}
#woh{padding:12px 15px;background:var(--w);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;box-shadow:var(--sh)}
#wob{flex:1;overflow-y:auto;padding:13px 15px;padding-bottom:105px}
#wof{position:fixed;bottom:0;left:0;right:0;padding:8px 13px 24px;background:var(--w);border-top:1px solid var(--bd);display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center}
.sr{display:grid;grid-template-columns:22px 1fr 1fr 34px;gap:5px;align-items:center;margin-bottom:5px}
.sn{font-size:11px;font-weight:700;color:var(--t3);text-align:center}
.si{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rx);padding:8px 3px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;width:100%;transition:border-color .2s}
.si:focus{border-color:var(--a);background:var(--w)}
.sc{width:32px;height:32px;border-radius:var(--rx);border:1.5px solid var(--bd2);background:transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
.sc.done{background:var(--a);border-color:var(--a);color:#fff;animation:popset .22s cubic-bezier(.34,1.56,.64,1)}
.hi{background:var(--w);border-radius:var(--r);border:1px solid var(--bd);padding:13px;margin-bottom:8px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.hi:active{background:var(--bg2)}
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--t);color:var(--w);padding:9px 16px;border-radius:99px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ro{position:fixed;inset:0;background:rgba(247,246,243,.97);backdrop-filter:blur(12px);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center}
#ro.open{display:flex}
#rr{width:170px;height:170px;position:relative;margin-bottom:20px}
#rr svg{position:absolute;inset:0;transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--bd2);stroke-width:6}.rp{fill:none;stroke:var(--a);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .9s linear}
#rn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
#rs{font-family:'DM Serif Display',serif;font-size:46px;color:var(--t);line-height:1}
#rl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;margin-top:3px}
.cw{position:relative;height:170px}
.er{display:flex;align-items:center;gap:9px;padding:10px;background:var(--w);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:5px;cursor:pointer;transition:all .2s}
.er:active{background:var(--bg2)}
.ei{width:38px;height:38px;border-radius:8px;background:var(--ax);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb{background:var(--w);border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--sh)}
.sv{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}.sl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.rd{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.rdg{background:#2D6A4F}.rdo{background:#E07B39}.rdr{background:#C0392B}
.div{height:1px;background:var(--bd);margin:11px 0}
.gr{position:relative;width:56px;height:56px;flex-shrink:0}
.gr svg{transform:rotate(-90deg)}
.gp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--a)}
@keyframes popset{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade{animation:fu .3s ease both}

.bstat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
/* timeline dot */
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--a);flex-shrink:0;margin-top:4px}
.tl-line{width:2px;background:var(--bd);flex:1;min-height:12px;margin:2px auto}
@media(min-width:600px){#sc{max-width:600px;margin:0 auto}#nav{max-width:600px;left:50%;transform:translateX(-50%)}}

    const s=this.g('sessions')||[];
    // Auto-restore from backup if primary key is empty but backup exists (fp4bak_ prefix survives doReset)

function calcTDEE(weight,height,age,goal){
  // Mifflin-St Jeor (homme)

  if(goal==='bulk')return tdee+300;
  if(goal==='cut')return tdee-400;
  return tdee;
}

}

function doImportJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      let count=0;
      if(Array.isArray(data.sessions)&&data.sessions.length){
        const merged=[...data.sessions,...DB.sessions()].filter((s,i,arr)=>arr.findIndex(x=>x.id===s.id)===i).sort((a,b)=>b.date-a.date);
        DB.saveSessions(merged);count=data.sessions.length;
      }
      if(Array.isArray(data.goals)&&data.goals.length)DB.saveGoals(data.goals);
      if(data.body)DB.saveBody(data.body);
      if(data.profile?.name)DB.saveProfile(data.profile);
      localStorage.setItem('fp4_lastExport',Date.now());
      closeM();toast(count+' séance(s) + données restaurées !');render();
    }catch{toast('Fichier JSON invalide');}
  };
  reader.readAsText(file);
}

function buildCalendar(ss, ps){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const firstDay = (new Date(y, m, 1).getDay()+6)%7; // Mon=0
  const today = now.getDate();

  // Map each day to session type
  const dayMap = {};
  ss.forEach(s => {
    const d = new Date(s.date);
    if(d.getFullYear()===y && d.getMonth()===m){
      dayMap[d.getDate()] = dayMap[d.getDate()]||[];
      dayMap[d.getDate()].push({type:s.presetKey, color: ps[s.presetKey]?.color||'#2D6A4F'});
    }
  });

  const days = ['L','M','M','J','V','S','D'];
  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
    ${days.map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:var(--t3);padding-bottom:2px">${d}</div>`).join('')}
  </div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;

  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const sess = dayMap[d]||[];
    const isToday = d===today;
    const hasSess = sess.length>0;
    const color = hasSess ? sess[sess.length-1].color : null;
    html+=`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;position:relative;
      background:${isToday?'var(--t)':hasSess?color+'18':'transparent'};
      border:${isToday?'2px solid var(--t)':hasSess?'1.5px solid '+color+'44':'1px solid transparent'};
      cursor:${hasSess?'pointer':'default'}"
      ${hasSess?`onclick="showDaySess(${d},${m},${y})"`:''}>
      <span style="font-size:11px;font-weight:${isToday||hasSess?'700':'500'};color:${isToday?'#fff':hasSess?color:'var(--t3)'}">${d}</span>
      ${sess.length>1?`<span style="position:absolute;top:2px;right:3px;width:5px;height:5px;border-radius:50%;background:${color}"></span>`:''}
    </div>`;
  }
  html+=`</div>`;

  // Legend
  const seenKeys = [...new Set(Object.values(dayMap).flat().map(s=>s.type))];
  if(seenKeys.length){
    html+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;padding-top:9px;border-top:1px solid var(--bd)">`;
    seenKeys.forEach(k=>{const p=ps[k];if(p)html+=`<div style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${p.color};display:inline-block"></span><span style="font-size:10px;font-weight:600;color:var(--t2)">${p.name}</span></div>`;});
    html+=`</div>`;
  }
  return html;
}

function showDaySess(d,m,y){
  const ss=DB.sessions();
  const daySess=ss.filter(s=>{const sd=new Date(s.date);return sd.getDate()===d&&sd.getMonth()===m&&sd.getFullYear()===y;});
  if(!daySess.length)return;
  openM(`<div class="mt">${d} ${new Date(y,m,d).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
    ${daySess.map(s=>`<div style="background:var(--bg2);border-radius:var(--rs);padding:12px;margin-bottom:8px;cursor:pointer" onclick="closeM();setTimeout(()=>openSD(${s.id}),50)">
      <div style="font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:4px">${s.type}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="chip cb">💪 ${s.sets} séries</span>
        <span class="chip cg">${s.volume}kg</span>
        <span class="chip co">${s.duration}min</span>
        ${s.prs?.length?`<span class="chip cgo">🏆 ${s.prs.length} PR</span>`:''}
      </div>
    </div>`).join('')}
  `);
}

function getWarmup(presetKey){
  const k = presetKey?.toLowerCase()||'';
  if(k.includes('upper'))return WARMUP.upper;
  if(k.includes('lower'))return WARMUP.lower;
  if(k.includes('push'))return WARMUP.push;
  if(k.includes('pull'))return WARMUP.pull;
  if(k.includes('arm')||k.includes('bras'))return WARMUP.arms;
  if(k.includes('full'))return WARMUP.full;
  return WARMUP.default;
}

let warmupStep=0, warmupTimer=null, warmupExercises=[], warmupCb=null;

function showWarmup(presetKey, cb){
  warmupExercises = getWarmup(presetKey);
  warmupStep = 0;
  warmupCb = cb;
  renderWarmupStep();
}

function renderWarmupStep(){
  const ex = warmupExercises[warmupStep];
  const total = warmupExercises.length;
  const isLast = warmupStep === total-1;
  if(warmupTimer)clearInterval(warmupTimer);
  let rem = ex.duration;

  openM(`<div style="text-align:center;margin-bottom:14px">
    <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Échauffement · ${warmupStep+1}/${total}</div>
    <div class="pb" style="height:5px;margin-bottom:14px"><div class="pf" id="wu-bar" style="width:${Math.round((warmupStep/total)*100)}%;background:var(--or);transition:width .6s ease"></div></div>
    <div style="font-size:40px;margin-bottom:8px">🔥</div>
    <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px">${ex.name}</div>
    <div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:16px">${ex.desc}</div>
    <div style="font-family:'DM Serif Display',serif;font-size:52px;color:var(--or);margin-bottom:6px" id="wu-timer">${rem}s</div>
    <div style="font-size:10px;color:var(--t3);margin-bottom:18px">secondes restantes</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="btn bg bfull" onclick="wuSkip()">Passer ›</button>
    ${isLast?`<button class="btn bp bfull" onclick="wuFinish()">Commencer la séance 💪</button>`:''}
  </div>`);

  setTimeout(()=>{const b=document.getElementById('wu-bar');if(b)b.style.width=Math.round(((warmupStep+1)/total)*100)+'%';},50);

  warmupTimer = setInterval(()=>{
    rem--;
    const el=document.getElementById('wu-timer');if(el)el.textContent=rem+'s';
    if(rem<=0){
      clearInterval(warmupTimer);
      if(isLast) wuFinish();
      else { warmupStep++; renderWarmupStep(); }
    }
  },1000);
}

function wuSkip(){
  if(warmupTimer)clearInterval(warmupTimer);
  warmupStep++;
  if(warmupStep>=warmupExercises.length) wuFinish();
  else renderWarmupStep();
}
function wuFinish(){
  if(warmupTimer)clearInterval(warmupTimer);
  closeM();
  toast('Échauffement terminé 🔥 C\'est parti !');
  setTimeout(()=>{ if(warmupCb) warmupCb(); warmupCb=null; },300);
}

  sc.innerHTML=`<div style="padding:18px 15px" class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

    </div>

    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:700;font-size:14px">Mon profil</div>
        <button class="btn bg bxs" onclick="openProfile()">✏️ Modifier</button>
      </div>

nEditS(${s.id})">✏️ Modifier</button><button class="btn bd_ bfull bsm" onclick="delS(${s.id})">Supprimer</button></div>`);}

function saveEditS(id){
  const ss=DB.sessions();const idx=ss.findIndex(x=>x.id===id);if(idx===-1)return;
  const s=ss[idx];
  s.type=document.getElementById('es-name')?.value||s.type;
  s.duration=parseInt(document.getElementById('es-dur')?.value)||s.duration;
  s.note=document.getElementById('es-note')?.value||'';
  if(_editStar>0)s.rating=_editStar;
  s.exs.forEach((ex,ei)=>{ex.sets.filter(st=>st.done).forEach((set,si)=>{const kg=document.getElementById(`es-kg-${ei}-${si}`)?.value;const reps=document.getElementById(`es-reps-${ei}-${si}`)?.value;if(kg!==undefined)set.kg=kg;if(reps!==undefined)set.reps=reps;});});
  let vol=0,sets=0;s.exs.forEach(ex=>ex.sets.forEach(set=>{if(set.done){sets++;vol+=(parseFloat(set.kg)||0)*(parseInt(set.reps)||0);}}));
  s.volume=Math.round(vol);s.sets=sets;s.calories=s.duration*7;
  DB.saveSessions(ss);updGoals();closeM();toast('Séance modifiée !');render();
}

function rExProg(id){
  const data=DB.sessions().filter(s=>s.exs.some(e=>e.id===id)).slice(0,25).reverse().map(s=>{
    const sets=s.exs.find(e=>e.id===id)?.sets.filter(s=>s.done)||[];
    const maxKg=sets.reduce((m,s)=>Math.max(m,parseFloat(s.kg)||0),0);
    const rm=sets.reduce((m,s)=>Math.max(m,c1RM(parseFloat(s.kg)||0,parseInt(s.reps)||0)),0);
    return{date:fDs(s.date),kg:maxKg,rm};
  });
  const ctx=document.getElementById('cprog');if(!ctx)return;
  if(pChart)pChart.destroy();
  pChart=new Chart(ctx,{type:'line',data:{labels:data.map(d=>d.date),datasets:[{label:'Charge max (kg)',data:data.map(d=>d.kg),borderColor:'#2D6A4F',backgroundColor:'rgba(45,106,79,.08)',borderWidth:2.5,tension:.35,pointBackgroundColor:'#2D6A4F',pointRadius:4,fill:true},{label:'1RM estimée',data:data.map(d=>d.rm),borderColor:'#B8860B',backgroundColor:'transparent',borderWidth:1.5,tension:.35,pointBackgroundColor:'#B8860B',pointRadius:3,borderDash:[4,4]}]},options:{plugins:{legend:{display:true,labels:{color:'#6B6760',font:{family:'DM Sans',size:10,weight:'600'},padding:8}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#A8A49E',font:{family:'DM Sans',size:9,weight:'600'}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#A8A49E',font:{family:'DM Sans',size:9,weight:'600'}}}}}});
  if(data.length){const l=data[data.length-1];const f=data[0];const df=Math.round((l.kg-f.kg)*10)/10;const ep=document.getElementById('epd');if(ep)ep.innerHTML=`<strong>${l.kg}kg</strong> max actuel · 1RM ~<strong style="color:var(--go)">${l.rm}kg</strong> · Progression : <strong style="color:${df>=0?'var(--a)':'var(--red)'}">${df>=0?'+':''}${df}kg</strong>`;}
}

  const muscles=[...document.querySelectorAll('.em-cb:checked')].map(cb=>cb.value);
  if(!muscles.length){toast('Sélectionne au moins un muscle');return;}
  const mo=DB.muscleOverrides();mo[id]=muscles.join(' · ');DB.saveMuscleOverrides(mo);
  openCreateEx('manage');toast('Muscles mis à jour !');render();
}
function toggleHideEx(id){
  const hidden=DB.hiddenExercises();const idx=hidden.indexOf(id);
  if(idx>=0)hidden.splice(idx,1);else hidden.push(id);
  DB.saveHiddenExercises(hidden);
  const q=document.getElementById('ex-search')?.value||'';openCreateEx('manage');
  setTimeout(()=>{const s=document.getElementById('ex-search');if(s&&q){s.value=q;filterManageEx(q);}},10);
}
function delCustomExById(id){
  DB.saveCustomExercises(DB.customExercises().filter(e=>e.id!==id));
  openCreateEx('manage');toast('Supprimé');
}
function saveCustomEx(){
  const name=document.getElementById('ex-name')?.value?.trim();
  const emoji=document.getElementById('ex-emoji')?.value?.trim()||'💪';
  const muscles=[...document.querySelectorAll('.ex-muscle-cb:checked')].map(cb=>cb.value);
  const muscle=muscles.length?muscles.join(' · '):'Autre';
  if(!name){toast('Donne un nom à l\'exercice');return;}
  if(!muscles.length){toast('Sélectionne au moins un groupe musculaire');return;}
  const id='custom_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').substring(0,30)+'_'+Date.now();
  const customs=DB.customExercises();
  customs.push({id,name,muscle,eq:'Libre',e:emoji});
  DB.saveCustomExercises(customs);
  closeM();toast(name+' ajouté !');render();
}
function delCustomEx(i){
  const customs=DB.customExercises();customs.splice(i,1);DB.saveCustomExercises(customs);openCreateEx();}
function confReset(){openM(`<div class="mt">⚠️ Réinitialiser ?</div><p style="color:var(--t2);margin-bottom:14px;font-size:12px">Toutes tes données seront supprimées.</p><button class="btn bd_ bfull" style="margin-bottom:5px" onclick="doReset()">Oui, tout supprimer</button><button class="btn bg bfull" onclick="closeM()">Annuler</button>`);}
function doReset(){['sessions','goals','presets','settings','imp','body','profile','customex','hiddenex','emojioverrides','muscleoverrides','wip'].forEach(k=>localStorage.removeItem('fp4_'+k));closeM();toast('Réinitialisé');render();}
